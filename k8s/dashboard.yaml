apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-auth
spec:
  basicAuth:
    secret: traefik-dashboard-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-redirect
spec:
  redirectRegex:
    regex: ^https://[^/]+/?$
    replacement: https://traefik.demo.example.com/dashboard/
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`traefik.demo.example.com`) && Path(`/`)
      middlewares:
        - name: traefik-dashboard-redirect
      services:
        - name: api@internal
          kind: TraefikService
    - kind: Rule
      match: Host(`traefik.demo.example.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      middlewares:
        - name: traefik-dashboard-auth
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: frontends-tls
